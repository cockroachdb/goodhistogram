name: Go

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go:
          - "1.23"
          - "1.24"
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go (${{ matrix.go }})
      uses: actions/setup-go@v4
      with:
        go-version: ${{ matrix.go }}

    - name: Build (${{ matrix.go }})
      run: go build ./...

    - name: Vet (${{ matrix.go }})
      run: go vet ./...

    - name: Test (${{ matrix.go }})
      run: go test ./...

    - name: Tidy (${{ matrix.go }})
      run: go mod tidy
